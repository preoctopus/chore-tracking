version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: chore_tracker_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: chore_tracker_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://db:27017/chore_tracking
      - FLASK_SECRET_KEY=dev-secret-key-chore-tracker-12345
      - FLASK_ENV=development
    volumes:
      - chore-uploads:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
    secrets:
      # GL.iNet router password is provided via Docker secret (from router_password.txt)
      # and promoted to the GLINET_ROUTER_PASS environment variable by docker-entrypoint.sh.
      # This allows glinet_blacklist.py / GlinetClient to read it securely.
      - router_password

secrets:
  # The router admin password is injected via Docker secret.
  # Create router_password.txt (gitignored) containing your GL.iNet router password.
  # The web service will fail to start if the file does not exist.
  # Override the file path if needed:
  #   GLINET_ROUTER_PASSWORD_FILE=./my-router-pass.txt docker-compose up
  router_password:
    file: ${GLINET_ROUTER_PASSWORD_FILE:-./router_password.txt}

volumes:
  mongo-data:
  chore-uploads:
